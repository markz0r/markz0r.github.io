<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdamiPad Builder</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0f;
        --surface: #12121a;
        --surface-muted: #1a1a28;
        --surface-raised: #181827;
        --text: #e0e7ff;
        --text-soft: #8b92b0;
        --accent: #00d9ff;
        --accent-strong: #b6f6ff;
        --accent-soft: rgba(0, 217, 255, 0.12);
        --accent-hover: rgba(0, 217, 255, 0.2);
        --accent-secondary: #a855f7;
        --accent-tertiary: #d946ef;
        --border: #1f2937;
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
        --glow-cyan: 0 0 10px rgba(0, 217, 255, 0.3), 0 0 20px rgba(0, 217, 255, 0.2);
        --glow-purple: 0 0 10px rgba(168, 85, 247, 0.3), 0 0 20px rgba(168, 85, 247, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, "Segoe UI", Roboto, sans-serif;
        background:
          linear-gradient(rgba(0, 217, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 217, 255, 0.03) 1px, transparent 1px),
          radial-gradient(circle at top, rgba(0, 217, 255, 0.08), transparent 30%),
          radial-gradient(circle at 85% 15%, rgba(168, 85, 247, 0.08), transparent 24%),
          linear-gradient(180deg, #0d0d13 0%, var(--bg) 100%);
        background-size: 50px 50px, 50px 50px, auto, auto, auto;
        color: var(--text);
      }

      a {
        color: inherit;
      }

      .page {
        min-height: 100vh;
        padding: 1rem;
      }

      .shell {
        width: min(100%, 70rem);
        margin: 0 auto;
      }

      .hero {
        background:
          radial-gradient(circle at top left, rgba(0, 217, 255, 0.12), transparent 36%),
          radial-gradient(circle at top right, rgba(168, 85, 247, 0.1), transparent 32%),
          var(--surface);
        border: 1px solid var(--border);
        border-radius: 1.5rem;
        box-shadow: var(--shadow);
        padding: 1.5rem;
      }

      .hero-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }

      .eyebrow {
        display: inline-flex;
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        border: 1px solid var(--border);
        box-shadow: var(--glow-cyan);
      }

      .summary-list {
        margin: 1rem 0 0;
        padding-left: 1.25rem;
      }

      .summary-list > li {
        color: var(--text);
        line-height: 1.6;
      }

      .summary-list ul {
        margin: 0.25rem 0 0.75rem;
        padding-left: 1.25rem;
      }

      .summary-list ul li {
        color: var(--text-soft);
      }

      .summary-choice {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .summary-choice-link {
        display: block;
        padding: 0.55rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: 0.85rem;
        background: var(--surface-muted);
        text-decoration: none;
      }

      .summary-choice-link--description {
        flex: 1;
      }

      .summary-choice-link--price {
        font-weight: 700;
        white-space: nowrap;
      }

      .summary-choice-link:hover {
        background: var(--surface-raised);
        border-color: rgba(0, 217, 255, 0.35);
      }

      .mini-buy-button,
      .choose-option-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 0.45rem 0.75rem;
        font: inherit;
        font-size: 0.82rem;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      .mini-buy-button {
        border: 1px solid var(--border);
        background: var(--accent-soft);
        color: var(--accent-strong);
        box-shadow: var(--glow-cyan);
      }

      .choose-option-button {
        border: 1px solid var(--border);
        background: var(--accent-soft);
        color: var(--accent-strong);
        box-shadow: var(--glow-cyan);
      }

      .mini-buy-button:hover,
      .choose-option-button:hover,
      .more-info-button:hover {
        background: var(--accent-hover);
      }

      .summary-total {
        margin: 1rem 0 0;
        font-weight: 700;
        text-align: center;
      }

      .hero-note {
        margin: 0.75rem 0 0;
        color: var(--text-soft);
        font-size: 0.8rem;
      }

      .layout {
        margin-top: 1.25rem;
        display: grid;
        gap: 1rem;
      }

      .cards {
        display: grid;
        gap: 1rem;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 1.25rem;
        box-shadow: var(--shadow);
        padding: 1.1rem;
      }

      .card h2 {
        margin: 0;
        font-size: 1.2rem;
      }

      .card .subtext {
        margin: 0.4rem 0 1rem;
        color: var(--text-soft);
        line-height: 1.5;
      }

      .field-label {
        display: block;
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }

      .option-table-wrap {
        border: 1px solid var(--border);
        border-radius: 1rem;
        overflow-x: auto;
        background: var(--surface-muted);
      }

      .option-table {
        width: 100%;
        border-collapse: collapse;
      }

      .option-table th,
      .option-table td {
        padding: 0.8rem;
        text-align: left;
        vertical-align: top;
      }

      .option-table thead {
        background: rgba(0, 217, 255, 0.08);
      }

      .option-table tbody tr + tr {
        border-top: 1px solid var(--border);
      }

      .option-table tbody tr {
        cursor: pointer;
        transition: background 0.15s ease;
      }

      .option-table tbody tr:hover {
        background: rgba(0, 217, 255, 0.04);
      }

      .option-table tbody tr:focus-within {
        background: var(--surface-raised);
      }

      .option-radio-cell {
        width: 3rem;
      }

      .option-price-cell,
      .option-info-cell,
      .option-buy-cell {
        white-space: nowrap;
      }

      .option-table input[type="radio"] {
        width: 1rem;
        height: 1rem;
        margin-top: 0.2rem;
      }

      .option-notes {
        display: block;
        margin-top: 0.3rem;
        color: var(--text-soft);
        font-size: 0.92rem;
        line-height: 1.45;
      }

      .more-info-button {
        border: 1px solid var(--border);
        background: var(--accent-soft);
        color: var(--accent-strong);
        border-radius: 999px;
        padding: 0.4rem 0.7rem;
        font: inherit;
        font-size: 0.82rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: var(--glow-cyan);
      }

      .more-info-row {
        background: rgba(0, 217, 255, 0.03);
      }

      .more-info-row[hidden] {
        display: none;
      }

      .more-info-cell {
        padding-top: 0;
        border-top: 1px solid rgba(0, 217, 255, 0.08);
      }

      .more-info-panel {
        max-height: 0;
        overflow: hidden;
        padding: 0 0.8rem;
        color: var(--text-soft);
        font-size: 0.85rem;
        line-height: 1.45;
        transition: max-height 0.2s ease, padding 0.2s ease;
      }

      .more-info-panel.is-open {
        max-height: 16rem;
        padding: 0.65rem 0.8rem 0.8rem;
      }

      .more-info-panel p {
        margin: 0;
      }

      .preview-link,
      .buy-link,
      .cta-button,
      .ghost-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        text-decoration: none;
        border-radius: 999px;
        padding: 0.75rem 1rem;
        font-weight: 700;
        font-size: 0.95rem;
        transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
      }

      .preview-link,
      .cta-button {
        background: var(--accent);
        color: #0a0a0f;
        border: none;
        box-shadow: var(--glow-cyan);
      }

      .ghost-button {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }

      .buy-link {
        background: var(--accent-soft);
        color: var(--accent-strong);
      }

      .preview-link:hover,
      .buy-link:hover,
      .cta-button:hover,
      .ghost-button:hover {
        transform: translateY(-1px);
      }

      .preview-link:hover,
      .cta-button:hover {
        background: #57e7ff;
      }

      .ghost-button:hover,
      .buy-link:hover {
        background: var(--surface-raised);
      }

      .floating-cart {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        z-index: 20;
      }

      .cart-button {
        display: inline-flex;
        align-items: center;
        gap: 0.7rem;
        border: none;
        border-radius: 999px;
        padding: 0.9rem 1rem;
        background: var(--surface-raised);
        color: var(--text);
        border: 1px solid var(--border);
        box-shadow: 0 16px 36px rgba(2, 6, 23, 0.4);
        font: inherit;
        font-weight: 700;
      }

      .cart-count {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        min-width: 1.7rem;
        height: 1.7rem;
        padding: 0 0.4rem;
        border-radius: 999px;
        background: rgba(0, 217, 255, 0.18);
      }

      dialog {
        width: min(100% - 1.5rem, 32rem);
        border: 1px solid var(--border);
        padding: 0;
        border-radius: 1.35rem;
        box-shadow: var(--shadow);
      }

      dialog::backdrop {
        background: rgba(3, 8, 20, 0.7);
        backdrop-filter: blur(3px);
      }

      .modal {
        padding: 1.25rem;
        background: var(--surface);
      }

      .modal-header,
      .modal-total {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        align-items: center;
      }

      .modal-header h2,
      .modal-total h3 {
        margin: 0;
      }

      .modal-header p {
        margin: 0.3rem 0 0;
        color: var(--text-soft);
      }

      .selection-list {
        list-style: none;
        padding: 0;
        margin: 1rem 0;
        display: grid;
        gap: 0.75rem;
      }

      .selection-item {
        background: var(--surface-muted);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 0.85rem;
      }

      .selection-item strong,
      .selection-item span {
        display: block;
      }

      .selection-meta {
        margin-top: 0.35rem;
        color: var(--text-soft);
        font-size: 0.92rem;
      }

      .selection-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        margin-top: 0.8rem;
      }

      .empty-state {
        margin: 1rem 0;
        padding: 1rem;
        border-radius: 1rem;
        background: var(--surface-muted);
        border: 1px dashed var(--border);
        color: var(--text-soft);
      }

      .modal-footer {
        display: flex;
        justify-content: flex-end;
        margin-top: 1rem;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (min-width: 768px) {
        .page {
          padding: 1.5rem;
        }

        .layout {
          grid-template-columns: minmax(0, 1fr);
        }

        .cards {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .hero-header {
          flex-direction: column;
          align-items: flex-start;
        }

        .summary-choice {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="shell">
        <section class="hero">
          <div class="hero-header">
            <span class="eyebrow">admiPad20260331</span>
            <span class="eyebrow" id="summary-total-eyebrow">Total: $0</span>
          </div>
          <ul class="summary-list" id="selection-summary"></ul>
          <p class="summary-total" id="summary-total">Total: $0</p>
          <p class="hero-note">* prices AUD</p>
        </section>

        <section class="layout">
          <div class="cards" id="item-grid" aria-live="polite"></div>
        </section>
      </div>
    </main>

    <div class="floating-cart">
      <button class="cart-button" id="open-cart" type="button" aria-haspopup="dialog">
        <span>View selections</span>
        <span class="cart-count" id="cart-count">0</span>
      </button>
    </div>

    <dialog id="cart-dialog" aria-labelledby="cart-title">
      <div class="modal">
        <div class="modal-header">
          <div>
            <h2 id="cart-title">Selected options</h2>
            <p>Your running total and purchase links update as you make selections.</p>
          </div>
          <button class="ghost-button" id="close-cart" type="button" aria-label="Close selections">
            Close
          </button>
        </div>

        <div class="modal-total">
          <h3>Total</h3>
          <strong id="modal-total">$0</strong>
        </div>

        <p class="empty-state" id="empty-state">
          No selections yet. Choose an option from the cards to build your setup.
        </p>
        <ul class="selection-list" id="selection-list"></ul>

        <div class="modal-footer">
          <button class="cta-button" id="open-all-links" type="button">Open all buy links</button>
        </div>
      </div>
    </dialog>

    <script>
      const dataPath = "./AdamiPad-20260331/AdamiPad-20260331.json";
      const itemGrid = document.getElementById("item-grid");
      const selectionSummary = document.getElementById("selection-summary");
      const summaryTotal = document.getElementById("summary-total");
      const summaryTotalEyebrow = document.getElementById("summary-total-eyebrow");
      const cartCount = document.getElementById("cart-count");
      const modalTotal = document.getElementById("modal-total");
      const selectionList = document.getElementById("selection-list");
      const emptyState = document.getElementById("empty-state");
      const cartDialog = document.getElementById("cart-dialog");
      const openCartButton = document.getElementById("open-cart");
      const closeCartButton = document.getElementById("close-cart");
      const openAllLinksButton = document.getElementById("open-all-links");
      const selections = new Map();
      let availableItems = [];

      const formatPrice = (value) => `$${Math.ceil(Number(value || 0))}`;

      const extractOptions = (entry) => {
        const candidates = [];

        if (Array.isArray(entry.ipadOptions)) {
          candidates.push(...entry.ipadOptions);
        }

        if (Array.isArray(entry.options)) {
          entry.options.forEach((option) => {
            if (Array.isArray(option.options)) {
              candidates.push(...option.options);
            } else {
              candidates.push(option);
            }
          });
        }

        return candidates.filter((option) => option && option.description && option.link);
      };

      const updateSummary = () => {
        const selectedItems = Array.from(selections.values());
        const total = selectedItems.reduce((sum, option) => sum + Number(option.price_aud || 0), 0);

        cartCount.textContent = String(selectedItems.length);
        modalTotal.textContent = formatPrice(total);
        summaryTotal.textContent = `Total: ${formatPrice(total)}`;
        summaryTotalEyebrow.textContent = `Total: ${formatPrice(total)}`;
        selectionSummary.innerHTML = "";

        availableItems.forEach((entry, index) => {
          const itemKey = `item-${index}`;
          const selectedOption = selections.get(itemKey);
          const item = document.createElement("li");
          item.textContent = entry.item;

          const details = document.createElement("ul");
          const detailsItem = document.createElement("li");

          if (!selectedOption) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "choose-option-button";
            button.textContent = "choose option";
            button.addEventListener("click", () => {
              const targetCard = document.querySelector(`[data-item-key="${itemKey}"]`);

              if (!targetCard) {
                return;
              }

              targetCard.scrollIntoView({ behavior: "smooth", block: "center" });
              targetCard.focus();
              const firstRadio = targetCard.querySelector('input[type="radio"]');
              if (firstRadio) {
                firstRadio.focus();
              }
            });
            detailsItem.appendChild(button);
          } else {
            detailsItem.className = "summary-choice";
            const link = document.createElement("a");
            link.className = "summary-choice-link summary-choice-link--description";
            link.href = selectedOption.link;
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.textContent = selectedOption.description;

            const priceLink = document.createElement("a");
            priceLink.className = "summary-choice-link summary-choice-link--price";
            priceLink.href = selectedOption.link;
            priceLink.target = "_blank";
            priceLink.rel = "noopener noreferrer";
            priceLink.textContent = formatPrice(selectedOption.price_aud);

            const buyButton = document.createElement("a");
            buyButton.className = "mini-buy-button";
            buyButton.href = selectedOption.link;
            buyButton.target = "_blank";
            buyButton.rel = "noopener noreferrer";
            buyButton.textContent = "Buy";

            detailsItem.append(link, priceLink, buyButton);
          }

          details.appendChild(detailsItem);
          item.appendChild(details);
          selectionSummary.appendChild(item);
        });

        selectionList.innerHTML = "";

        if (!selectedItems.length) {
          emptyState.hidden = false;
          openAllLinksButton.disabled = true;
          openAllLinksButton.setAttribute("aria-disabled", "true");
          return;
        }

        emptyState.hidden = true;
        openAllLinksButton.disabled = false;
        openAllLinksButton.removeAttribute("aria-disabled");

        selectedItems.forEach((option) => {
          const item = document.createElement("li");
          item.className = "selection-item";

          const title = document.createElement("strong");
          title.textContent = option.itemLabel;

          const description = document.createElement("span");
          description.textContent = option.description;

          const meta = document.createElement("span");
          meta.className = "selection-meta";
          meta.textContent = `${formatPrice(option.price_aud)} • ${option.Notes || "No extra notes"}`;

          const actions = document.createElement("div");
          actions.className = "selection-actions";

          const link = document.createElement("a");
          link.className = "buy-link";
          link.href = option.link;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = "Buy in new tab";

          actions.appendChild(link);
          item.append(title, description, meta, actions);
          selectionList.appendChild(item);
        });
      };

      const renderItems = (items) => {
        availableItems = items;
        itemGrid.innerHTML = "";

        items.forEach((entry, index) => {
          const options = extractOptions(entry);

          if (!options.length) {
            return;
          }

          const itemKey = `item-${index}`;
          const groupName = `select-${index}`;
          const card = document.createElement("article");
          card.className = "card";
          card.dataset.itemKey = itemKey;
          card.tabIndex = -1;
          const title = document.createElement("h2");
          title.textContent = entry.item;

          const subtext = document.createElement("p");
          subtext.className = "subtext";
          subtext.textContent = entry.optionNote || "Select the option that best matches your setup.";

          const label = document.createElement("p");
          label.className = "field-label";
          label.textContent = "Choose an option";

          const tableWrap = document.createElement("div");
          tableWrap.className = "option-table-wrap";

          const table = document.createElement("table");
          table.className = "option-table";

          const thead = document.createElement("thead");
          const headerRow = document.createElement("tr");

          ["Pick", "Option", "Price", "More info", "Buy"].forEach((heading) => {
            const cell = document.createElement("th");
            cell.scope = "col";
            cell.textContent = heading;
            headerRow.appendChild(cell);
          });

          thead.appendChild(headerRow);

          const tbody = document.createElement("tbody");

          options.forEach((option, optionIndex) => {
            const row = document.createElement("tr");
            const radioCell = document.createElement("td");
            radioCell.className = "option-radio-cell";
            const detailCell = document.createElement("td");
            const priceCell = document.createElement("td");
            priceCell.className = "option-price-cell";
            const infoCell = document.createElement("td");
            infoCell.className = "option-info-cell";
            const buyCell = document.createElement("td");
            buyCell.className = "option-buy-cell";

            const radio = document.createElement("input");
            radio.type = "radio";
            radio.name = groupName;
            radio.value = String(optionIndex);
            radio.setAttribute("aria-label", option.description);

            const description = document.createElement("strong");
            description.textContent = option.description;

            detailCell.appendChild(description);

            if (option.Notes) {
              const notes = document.createElement("span");
              notes.className = "option-notes";
              notes.textContent = option.Notes;
              detailCell.appendChild(notes);
            }

            priceCell.textContent = formatPrice(option.price_aud);

            const infoButton = document.createElement("button");
            infoButton.type = "button";
            infoButton.className = "more-info-button";
            infoButton.textContent = "More info";
            infoButton.setAttribute("aria-expanded", "false");

            const infoRow = document.createElement("tr");
            infoRow.className = "more-info-row";
            infoRow.hidden = true;

            const infoRowCell = document.createElement("td");
            infoRowCell.className = "more-info-cell";
            infoRowCell.colSpan = 5;

            const infoPanel = document.createElement("div");
            infoPanel.className = "more-info-panel";

            const infoText = document.createElement("div");
            infoText.innerHTML = option.Further_Notes || option.Notes || "No extra info provided.";

            infoPanel.appendChild(infoText);
            infoRowCell.appendChild(infoPanel);
            infoRow.appendChild(infoRowCell);
            infoCell.appendChild(infoButton);

            const buyLink = document.createElement("a");
            buyLink.className = "preview-link";
            buyLink.href = "#";
            buyLink.textContent = "Select";
            buyCell.appendChild(buyLink);

            radioCell.appendChild(radio);
            row.append(radioCell, detailCell, priceCell, infoCell, buyCell);
            tbody.appendChild(row);
            tbody.appendChild(infoRow);

            const selectRow = () => {
              if (radio.checked) {
                return;
              }

              radio.checked = true;
              radio.dispatchEvent(new Event("change", { bubbles: true }));
            };

            row.addEventListener("click", (event) => {
              if (event.target.closest("button") || event.target.closest("a")) {
                return;
              }

              selectRow();
            });

            buyLink.addEventListener("click", (event) => {
              event.preventDefault();
              selectRow();
            });

            infoButton.addEventListener("click", () => {
              const isOpen = infoButton.getAttribute("aria-expanded") === "true";
              infoButton.setAttribute("aria-expanded", String(!isOpen));
              infoRow.hidden = isOpen;
              infoPanel.classList.toggle("is-open", !isOpen);
            });

            radio.addEventListener("change", () => {
              const selectedOption = {
                ...option,
                itemLabel: entry.item,
              };

              selections.set(itemKey, selectedOption);
              updateSummary();
            });
          });

          table.append(thead, tbody);
          tableWrap.appendChild(table);

          card.append(title, subtext, label, tableWrap);

          itemGrid.appendChild(card);
        });
      };

      openCartButton.addEventListener("click", () => {
        cartDialog.showModal();
      });

      closeCartButton.addEventListener("click", () => {
        cartDialog.close();
      });

      cartDialog.addEventListener("click", (event) => {
        if (event.target === cartDialog) {
          cartDialog.close();
        }
      });

      openAllLinksButton.addEventListener("click", () => {
        Array.from(selections.values()).forEach((option) => {
          window.open(option.link, "_blank", "noopener");
        });
      });

      fetch(dataPath)
        .then((response) => {
          if (!response.ok) {
            throw new Error("Unable to load item data.");
          }

          return response.json();
        })
        .then((payload) => {
          const items = payload["AdamiPad-20260331"];

          if (!Array.isArray(items)) {
            throw new Error("Unexpected item data format.");
          }

          renderItems(items);
          updateSummary();
        })
        .catch((error) => {
          itemGrid.innerHTML = "";
          const errorCard = document.createElement("article");
          errorCard.className = "card";

          const title = document.createElement("h2");
          title.textContent = "Unable to load the setup data";

          const message = document.createElement("p");
          message.className = "subtext";
          message.textContent = error.message;

          errorCard.append(title, message);
          itemGrid.appendChild(errorCard);
        });
    </script>
  </body>
</html>
